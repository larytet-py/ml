name: Option Signal Notifier

on:
  schedule:
    # Weekdays at 08:15 UTC (adjust as needed).
    - cron: '15 22 * * 1-5'
  workflow_dispatch:

jobs:
  run-notifier:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run notifier
        id: notifier
        env:
          MARKET_STACK_API_KEY: ${{ secrets.MARKET_STACK_API_KEY }}
        run: |
          set -euo pipefail
          mkdir -p data
          python option_signal_notifier.py --config option_signal_notifier.config | tee notifier_output.txt

          {
            echo "excerpt<<EOF"
            tail -n 25 notifier_output.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if grep -q "NOTIFICATION: ENTER" notifier_output.txt; then
            echo "has_signal=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_signal=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated ETF cache
        id: commit_cache
        run: |
          set -euo pipefail
          git lfs install

          if [ ! -f data/etfs.csv ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --quiet -- data/etfs.csv; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/etfs.csv
          git commit -m "chore: update data/etfs.csv [skip ci]"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Send signal email (Resend API)
        if: steps.notifier.outputs.has_signal == 'true'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EXCERPT: ${{ steps.notifier.outputs.excerpt }}
        run: |
          set -euo pipefail

          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          api_key = os.environ["RESEND_API_KEY"]
          to_email = os.environ["EMAIL_TO"]
          from_email = os.environ["EMAIL_FROM"]
          repository = os.environ["REPOSITORY"]
          run_url = os.environ["RUN_URL"]
          excerpt = os.environ.get("EXCERPT", "")

          subject = f"Option signal fired: {repository}"
          body = (
              "One or more option entry signals fired.\n\n"
              f"Repository: {repository}\n"
              f"Run URL: {run_url}\n\n"
              "Output excerpt:\n"
              "----------------------------------------\n"
              f"{excerpt}\n"
          )

          payload = {
              "from": from_email,
              "to": [to_email],
              "subject": subject,
              "text": body,
          }

          req = urllib.request.Request(
              "https://api.resend.com/emails",
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Authorization": f"Bearer {api_key}",
                  "Content-Type": "application/json",
                  "User-Agent": "option-signal-notifier/1.0",
              },
              method="POST",
          )

          try:
              with urllib.request.urlopen(req, timeout=30) as response:
                  print(f"Resend accepted email request (HTTP {response.status}).")
          except urllib.error.HTTPError as exc:
              error_body = exc.read().decode("utf-8", errors="replace")
              raise RuntimeError(f"Resend API failed (HTTP {exc.code}): {error_body}") from exc
          PY
