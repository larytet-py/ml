name: Option Signal Notifier

on:
  schedule:
    - cron: '11 22 * * 1-5' # UTC
  workflow_dispatch:

jobs:
  run-notifier:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run notifier
        id: notifier
        env:
          MARKET_STACK_API_KEY: ${{ secrets.MARKET_STACK_API_KEY }}
        run: |
          set -euo pipefail
          mkdir -p data
          python option_signal_notifier.py --config option_signal_notifier.config --summary-json notifier_summary.json | tee notifier_output.txt
          python .github/scripts/build_notifier_excerpt.py --summary-json notifier_summary.json

      - name: Commit updated ETF cache
        id: commit_cache
        run: |
          set -euo pipefail
          git lfs install

          if [ ! -f data/etfs.csv ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --quiet -- data/etfs.csv; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/etfs.csv
          git commit -m "chore: update data/etfs.csv [skip ci]"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Send signal email (Resend API)
        if: steps.notifier.outputs.has_signal == 'true'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EXCERPT: ${{ steps.notifier.outputs.excerpt }}
        run: |
          set -euo pipefail
          python .github/scripts/send_signal_email.py
