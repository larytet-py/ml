backtest:
  name: weekly_single_leg
  class: backtest_option_strategy_sobol_gradient.PrecomputedFeatureBacktester
  dimensions:
    roc_window_size:
      min: 2
      max: 60
      type: int
    vol_window_size:
      min: 2
      max: 40
      type: int
    roc_threshold:
      min: -0.40
      max: 0.40
      type: float
    vol_threshold:
      min: 0.00
      max: 1.00
      type: float
  knob_defaults:
    roc_window_size: 2
    roc_comparator: below
    roc_threshold: 0.0
    roc_range_enabled: 0
    roc_range_low: 0.0
    roc_range_high: 0.0
    vol_window_size: 2
    vol_comparator: above
    vol_threshold: 0.0
    vol_range_enabled: 0
    vol_range_low: 0.0
    vol_range_high: 0.0
  dimension_aliases:
    roc_window: roc_window_size
    vol_window: vol_window_size

window_ranges:
  roc_window:
    min: 2
    max: 60
    step: 1
  accel_roc_window:
    min: 1
    max: 20
    step: 1
  accel_shift_window:
    min: 1
    max: 10
    step: 1
  vol_window:
    min: 2
    max: 40
    step: 1
  corr_window:
    min: 5
    max: 90
    step: 1

smoothing:
  accel_ema_window: 8
  vol_ema_window: 8

price_momentum_source: close
